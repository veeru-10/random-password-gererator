<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2 class="password-title">Random Password Geneartor</h2>
    <div class="password-container">
      <input type="text" class="input" id="input" placeholder="Random Password" readonly>
      <i class="fa-regular fa-copy fa-2x copy-icon"></i>
    </div>
    <button class="generate">Generate</button>
    <div class="alert"></div>
  </div>
  <script src="https://kit.fontawesome.com/117f574ca1.js" crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
